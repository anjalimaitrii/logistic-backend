name: Deploy Dev Backend (PM2)

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies and build
        run: |
          npm ci
          npx tsc

      - name: Upload built files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AFRICA_SERVER_HOST }}
          username: ${{ secrets.AFRICA_SERVER_USER }}
          port: ${{ secrets.AFRICA_SERVER_PORT }}
          key: ${{ secrets.AFRICA_SSH_PRIVATE_KEY }}
          source: "dist/,package.json,package-lock.json,ecosystem.dev.config.cjs"
          target: /home/ubuntu/fleet-logistic/dev/backend
          rm: false

      - name: Install prod deps and restart PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AFRICA_SERVER_HOST }}
          username: ${{ secrets.AFRICA_SERVER_USER }}
          port: ${{ secrets.AFRICA_SERVER_PORT }}
          key: ${{ secrets.AFRICA_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/ubuntu/fleet-logistic/dev/backend
            cat > .env << 'ENVEOF'
            NODE_ENV=development
            FRONTEND_URL=https://fleet-dev.maitriiinfotech.com/
            MONGO_URL=${{ secrets.DEV_MONGO_URL }}
            JWT_SECRET=${{ secrets.DEV_JWT_SECRET }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            AWS_SES_SENDER_EMAIL=${{ secrets.AWS_SES_SENDER_EMAIL }}
            AWS_SES_CONFIGURATION_SET_NAME=${{ secrets.AWS_SES_CONFIGURATION_SET_NAME }}
            TRAKZEE_BASE_URL=${{ secrets.TRAKZEE_BASE_URL }}
            TRAKZEE_USERNAME=${{ secrets.TRAKZEE_USERNAME }}
            TRAKZEE_PASSWORD=${{ secrets.TRAKZEE_PASSWORD }}
            ADMIN_ALERT_EMAIL=${{ secrets.ADMIN_ALERT_EMAIL }}
            AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            ADMIN_NAME=${{ secrets.ADMIN_NAME }}
            ADMIN_EMAIL_2=${{ secrets.ADMIN_EMAIL_2 }}
            ADMIN_PASSWORD_2=${{ secrets.ADMIN_PASSWORD_2 }}
            ADMIN_NAME_2=${{ secrets.ADMIN_NAME_2 }}
            ENVEOF
            npm ci --omit=dev
            pm2 reload ecosystem.dev.config.cjs --env development 2>/dev/null || pm2 start ecosystem.dev.config.cjs --env development
            pm2 save
            echo "✅ fleet-backend-dev deployed (.env written from secrets)"
