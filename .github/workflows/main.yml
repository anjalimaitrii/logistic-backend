name: Deploy Prod Backend (PM2)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies and build
        run: |
          npm ci
          npx tsc

      - name: Upload built files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "dist/,package.json,package-lock.json,ecosystem.config.cjs"
          target: /root/fleet/fleet-backend
          rm: false

      - name: Install prod deps and restart PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e
            cd /root/fleet/fleet-backend
            cat > .env << 'ENVEOF'
            NODE_ENV=production
            FRONTEND_URL=https://fleet.maitriiinfotech.com/
            MONGO_URL=${{ secrets.MONGO_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            AWS_SES_SENDER_EMAIL=${{ secrets.AWS_SES_SENDER_EMAIL }}
            AWS_SES_CONFIGURATION_SET_NAME=${{ secrets.AWS_SES_CONFIGURATION_SET_NAME }}
            TRAKZEE_BASE_URL=${{ secrets.TRAKZEE_BASE_URL }}
            TRAKZEE_USERNAME=${{ secrets.TRAKZEE_USERNAME }}
            TRAKZEE_PASSWORD=${{ secrets.TRAKZEE_PASSWORD }}
            ADMIN_ALERT_EMAIL=${{ secrets.ADMIN_ALERT_EMAIL }}
            AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            ADMIN_NAME=${{ secrets.ADMIN_NAME }}
            ADMIN_EMAIL_2=${{ secrets.ADMIN_EMAIL_2 }}
            ADMIN_PASSWORD_2=${{ secrets.ADMIN_PASSWORD_2 }}
            ADMIN_NAME_2=${{ secrets.ADMIN_NAME_2 }}
            ENVEOF
            npm ci --omit=dev
            pm2 reload ecosystem.config.cjs --env production 2>/dev/null || pm2 start ecosystem.config.cjs --env production
            pm2 save
            echo "✅ fleet-backend deployed (.env written from secrets)"
